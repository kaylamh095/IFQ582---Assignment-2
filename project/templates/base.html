<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="description" content="Library of Indigenous Knowledge and History">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <title>{%block title%} Library of Indigenous Knowledge and History{% endblock %}</title>

<!-- Bootstrap CSS -->
<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css">
   
<!-- Custom CSS -->
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css')}}">

</head>

<body>

<header>
<!--Top Navbar-->
<nav class="navbar navbar-dark navbar-custom">
  <div class="container">

    <a class="navbar-brand" href="{{ url_for('bp.index')}}">
      Library of Indigenous Knowledge and History
    </a>
    <div class="ml-auto">
      <a class="btn btn-outline-light btn-sm" href="#!">
        Login / Account
      </a>
    </div>
  </div>
</nav>

    <!--Secondary Navigation Bar (Bootstrap)-->
        <nav class="navbar navbar-expand-lg navbar-dark navbar-custom-secondary">
        <div class="container">

  <button class="navbar-toggler" 
          type="button" 
          data-toggle="collapse" 
          data-target="#mainNavbar" 
          aria-controls="mainNavbar" 
          aria-expanded="false" 
          aria-label="Toggle navigation">
    <span class="navbar-toggler-icon"></span>

  </button>

  <div class="collapse navbar-collapse justify-content-end" id="mainNavbar">
    <div class="navbar-nav">
      <a class="nav-item nav-link {% if request.endpoint == 'bp.index'%} active{% endif %}" 
      href="{{ url_for('bp.index') }}">Home </a>
      <a class="nav-item nav-link {% if request.endpoint == 'bp.item'%} active{% endif %}"
      href="{{ url_for('bp.item') }}">Collection Item</a>
      <a class="nav-item nav-link {% if request.endpoint == 'bp.assessment' %}active{% endif %}"
      href="{{ url_for('bp.assessment') }}">Reviewer Assessment</a>
    <a class="nav-item nav-link {% if request.endpoint == 'bp.assessment' %}active{% endif %}"
      href="{{ url_for('bp.index') }}#contact">
      Contact
      </a>
    </div>

  </div>

 </div>

</nav>
     <!-- This is the blank spot child pages will fill in -->
        {% block content %}
        {% endblock %}
</header>
<main>

</main>

<footer class="footer-custom text-white text-center py-3">
  <p class="mb-0">&copy; Library of Indigenous Knowledge and History 2026. All rights reserved.</p>
</footer>

<!-- jQuery first, then Popper.js, then Bootstrap JS -->

<script src="https://code.jquery.com/jquery-3.4.1.slim.min.js" integrity="sha384-J6qa4849blE2+poT4WnyKhv5vZF5SrPo0iEjwBvKU7imGFAV0wwj1yYfoRSJoZ+n" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js" integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo" crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js" integrity="sha384-wfSDF2E50Y2D1uUdj0O3uMBJnjuUD4Ih7YwaYd1iqfktj0Uod8GCExl3Og8ifwB6" crossorigin="anonymous"></script>

<script>

$(document).ready(function() {
    // Target the modal ID and show it
    if (localStorage.getItem('welcomeModalShown') !=='true'){
    $('#exampleModal3').modal('show');
    localStorage.setItem('welcomeModalShown', 'true');
    }
});
</script>

</body>
</html>
